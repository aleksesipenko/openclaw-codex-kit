host: "__HOST__"
port: __PORT__
tls:
  enable: false
  cert: ""
  key: ""
remote-management:
  allow-remote: false
  secret-key: "__MANAGEMENT_KEY__"
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"
auth-dir: "__AUTH_DIR__"
api-keys:
  - "__API_KEY__"
debug: false
logging-to-file: true
logs-max-total-size-mb: 200
error-logs-max-files: 10
usage-statistics-enabled: true
proxy-url: "__UPSTREAM_PROXY_URL__"
request-retry: 3
max-retry-credentials: 5
max-retry-interval: 15
quota-exceeded:
  switch-project: true
  switch-preview-model: true
routing:
  strategy: "round-robin"
request-log: false
